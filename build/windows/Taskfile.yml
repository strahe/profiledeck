version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    deps:
      - task: common:frontend:build
        vars:
          DEV: '{{.DEV}}'
    cmds:
      - task: generate:syso
        vars:
          ARCH: '{{.TARGET_ARCH}}'
      - cmd: mkdir -p "{{.BIN_DIR}}"
        platforms: [darwin, linux]
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path '{{.BIN_DIR}}' | Out-Null"
        platforms: [windows]
      - 'go build {{.BUILD_FLAGS}} -o "{{.BIN_DIR}}/{{.APP_NAME}}.exe" ./desktop'
      - cmd: 'rm -f "desktop/wails_windows_{{.TARGET_ARCH}}.syso"'
        platforms: [darwin, linux]
      - cmd: powershell -NoProfile -Command "Remove-Item -Force -ErrorAction SilentlyContinue 'desktop/wails_windows_{{.TARGET_ARCH}}.syso'"
        platforms: [windows]
    vars:
      TARGET_ARCH: '{{.ARCH | default ARCH}}'
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if .EXTRA_TAGS}}-tags {{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui"{{end}}'
    env:
      GOOS: windows
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_ENABLED: '{{.CGO_ENABLED | default "0"}}'

  generate:syso:
    desc: Embed the Windows application icon and metadata
    internal: true
    deps:
      - task: common:generate:icons
    cmds:
      - >-
        wails3 generate syso
        -arch "{{.ARCH}}"
        -icon build/windows/icon.ico
        -manifest build/windows/wails.exe.manifest
        -info build/windows/info.json
        -out "desktop/wails_windows_{{.ARCH}}.syso"

  run:
    cmds:
      - '.\{{.BIN_DIR}}\{{.APP_NAME}}.exe'
