version: '3'

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - bin
      - build
      - desktop/frontend
      - docs
    file:
      - .DS_Store
      - '*_test.go'
    watched_extension:
      - '*.go'
    git_ignore: true
  executes:
    - cmd: wails3 task common:frontend:install
      type: once
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:frontend:dev
      type: background
    - cmd: wails3 task run
      type: primary
