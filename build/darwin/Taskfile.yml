version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    deps:
      - task: common:frontend:build
        vars:
          DEV: '{{.DEV}}'
    cmds:
      - mkdir -p "{{.BIN_DIR}}"
      - 'go build {{.BUILD_FLAGS}} -o "{{.BIN_DIR}}/{{.APP_NAME}}" ./desktop'
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if .EXTRA_TAGS}}-tags {{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s"{{end}}'
    env:
      GOOS: darwin
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_ENABLED: '1'
      MACOSX_DEPLOYMENT_TARGET: '14.0'
      CGO_CFLAGS: '-O2 -g -mmacosx-version-min=14.0'
      CGO_CXXFLAGS: '-O2 -g -mmacosx-version-min=14.0'
      CGO_LDFLAGS: '-O2 -g -mmacosx-version-min=14.0'

  run:
    cmds:
      - '"./{{.BIN_DIR}}/{{.APP_NAME}}"'
