version: '3'

includes:
  common: ../Taskfile.yml

vars:
  MACOS_MIN_VERSION: '14.0'
  MACOS_BUNDLE_ID: io.github.strahe.profiledeck
  DEFAULT_BINARY: '{{.BIN_DIR}}/{{.APP_NAME}}'
  DEFAULT_UNIVERSAL_DIR: '{{.BIN_DIR}}/darwin-universal'
  DEFAULT_UNIVERSAL_BINARY: '{{.DEFAULT_UNIVERSAL_DIR}}/{{.APP_NAME}}'
  RELEASE_PLATFORM: macos
  NOTARY_PROFILE: '{{.NOTARY_PROFILE | default "apple-notary"}}'
  RELEASE_KEYCHAIN: '{{.RELEASE_KEYCHAIN | default ""}}'

tasks:
  build:
    deps:
      - task: common:frontend:build
        vars:
          DEV: '{{.DEV}}'
    cmds:
      - mkdir -p "$(dirname '{{.OUTPUT_PATH}}')"
      - 'go build {{.BUILD_FLAGS}} -o "{{.OUTPUT_PATH}}" ./desktop'
    vars:
      OUTPUT_PATH: '{{.OUTPUT | default .DEFAULT_BINARY}}'
      RELEASE_LDFLAGS: '{{if .VERSION}}-w -s -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.buildDate={{.BUILD_DATE}} -X main.updatePublicKeyBase64={{.PROFILEDECK_UPDATE_PUBLIC_KEY_BASE64}}{{else}}-w -s{{end}}'
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if .EXTRA_TAGS}}-tags {{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="{{.RELEASE_LDFLAGS}}"{{end}}'
    env:
      GOOS: darwin
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_ENABLED: '1'
      MACOSX_DEPLOYMENT_TARGET: '{{.MACOS_MIN_VERSION}}'
      CGO_CFLAGS: '-O2 -g -mmacosx-version-min={{.MACOS_MIN_VERSION}}'
      CGO_CXXFLAGS: '-O2 -g -mmacosx-version-min={{.MACOS_MIN_VERSION}}'
      CGO_LDFLAGS: '-O2 -g -mmacosx-version-min={{.MACOS_MIN_VERSION}}'

  build:universal:
    desc: Build a Universal macOS desktop binary
    deps:
      - task: build
        vars:
          ARCH: arm64
          OUTPUT: '{{.SLICE_DIR}}/{{.APP_NAME}}-arm64'
          VERSION: '{{.VERSION}}'
          COMMIT: '{{.COMMIT}}'
          BUILD_DATE: '{{.BUILD_DATE}}'
      - task: build
        vars:
          ARCH: amd64
          OUTPUT: '{{.SLICE_DIR}}/{{.APP_NAME}}-amd64'
          VERSION: '{{.VERSION}}'
          COMMIT: '{{.COMMIT}}'
          BUILD_DATE: '{{.BUILD_DATE}}'
    cmds:
      - mkdir -p "$(dirname '{{.OUTPUT_PATH}}')"
      - >-
        xcrun lipo -create
        "{{.SLICE_DIR}}/{{.APP_NAME}}-arm64"
        "{{.SLICE_DIR}}/{{.APP_NAME}}-amd64"
        -output "{{.OUTPUT_PATH}}"
      - xcrun lipo "{{.OUTPUT_PATH}}" -verify_arch arm64 x86_64
    vars:
      SLICE_DIR: '{{.WORK_DIR | default .DEFAULT_UNIVERSAL_DIR}}'
      OUTPUT_PATH: '{{.OUTPUT | default .DEFAULT_UNIVERSAL_BINARY}}'

  package:universal:
    desc: Package a Universal macOS application bundle
    deps:
      - task: common:generate:icons
      - task: build:universal
        vars:
          WORK_DIR: '{{.WORK_DIR}}'
          OUTPUT: '{{.UNIVERSAL_BINARY}}'
          VERSION: '{{.VERSION}}'
          COMMIT: '{{.COMMIT}}'
          BUILD_DATE: '{{.BUILD_DATE}}'
    cmds:
      - mkdir -p "{{.APP_PATH}}/Contents/MacOS"
      - mkdir -p "{{.APP_PATH}}/Contents/Resources"
      - install -m 0755 "{{.UNIVERSAL_BINARY}}" "{{.APP_PATH}}/Contents/MacOS/{{.APP_NAME}}"
      - install -m 0644 build/darwin/icons.icns "{{.APP_PATH}}/Contents/Resources/icons.icns"
      - >-
        if [ -f build/darwin/Assets.car ]; then
          install -m 0644 build/darwin/Assets.car "{{.APP_PATH}}/Contents/Resources/Assets.car";
        fi
      - cp build/darwin/Info.plist.tmpl "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -replace CFBundleDisplayName -string "{{.PRODUCT_NAME}}" "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -replace CFBundleName -string "{{.PRODUCT_NAME}}" "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -replace CFBundleExecutable -string "{{.APP_NAME}}" "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -replace CFBundleIdentifier -string "{{.MACOS_BUNDLE_ID}}" "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -replace CFBundleShortVersionString -string "{{.BUNDLE_VERSION}}" "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -replace CFBundleVersion -string "{{.BUNDLE_BUILD_NUMBER}}" "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -replace LSMinimumSystemVersion -string "{{.MACOS_MIN_VERSION}}" "{{.APP_PATH}}/Contents/Info.plist"
      - scripts/release/check-plist-placeholders.sh "{{.APP_PATH}}/Contents/Info.plist"
      - plutil -lint "{{.APP_PATH}}/Contents/Info.plist"
    vars:
      WORK_DIR: '{{.WORK_DIR | default .DEFAULT_UNIVERSAL_DIR}}'
      UNIVERSAL_BINARY: '{{.UNIVERSAL_BINARY | default .DEFAULT_UNIVERSAL_BINARY}}'
      BUNDLE_BUILD_NUMBER: '{{.BUILD_NUMBER | default "1"}}'
      PRODUCT_NAME: '{{.PRODUCT_NAME | default "ProfileDeck"}}'
    requires:
      vars:
        - APP_PATH
        - BUNDLE_VERSION

  release:
    desc: Build, sign, notarize, package, and verify a macOS release
    cmds:
      - |
        set -euo pipefail
        if [ "$(git rev-parse HEAD)" != "{{.RELEASE_COMMIT}}" ] || [ -n "$(git status --porcelain)" ]; then
          echo "The release source must match the requested commit and have no local changes." >&2
          exit 1
        fi
        releases_dir="$(mkdir -p "{{.RELEASES_DIR}}" && cd "{{.RELEASES_DIR}}" && pwd -P)"
        final_dir="$releases_dir/v{{.VERSION}}/platforms/{{.RELEASE_PLATFORM}}"
        if [ -e "$final_dir" ]; then
          echo "The macOS release handoff already exists. Choose another version or remove it before retrying." >&2
          exit 1
        fi
        stage_dir="$(mktemp -d "$releases_dir/.v{{.VERSION}}-{{.RELEASE_PLATFORM}}.XXXXXX")"
        cleanup() {
          case "$stage_dir" in
            "$releases_dir"/.v{{.VERSION}}-{{.RELEASE_PLATFORM}}.*) rm -rf -- "$stage_dir" ;;
          esac
        }
        trap cleanup EXIT
        work_dir="$stage_dir/work"
        raw_dir="$stage_dir/raw"
        app_path="$work_dir/{{.PRODUCT_NAME}}.app"
        built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        mkdir -p "$work_dir" "$raw_dir"
        sign_identity="$(scripts/release/resolve-signing-identity.sh \
          --requested "${PROFILEDECK_RELEASE_SIGN_IDENTITY-}" \
          --keychain "{{.RELEASE_KEYCHAIN}}" --output fingerprint)"
        scripts/release/notarize-macos.sh check \
          --profile "{{.NOTARY_PROFILE}}" --keychain "{{.RELEASE_KEYCHAIN}}"
        "{{.TASK_EXE}}" task darwin:package:universal \
          VERSION="{{.VERSION}}" BUNDLE_VERSION="{{.SHORT_VERSION}}" BUILD_NUMBER="{{.BUILD_NUMBER}}" \
          COMMIT="{{.RELEASE_COMMIT}}" BUILD_DATE="$built_at" \
          PRODUCT_NAME="{{.PRODUCT_NAME}}" WORK_DIR="$work_dir/slices" \
          UNIVERSAL_BINARY="$work_dir/{{.APP_NAME}}" APP_PATH="$app_path"
        if [ "$(git rev-parse HEAD)" != "{{.RELEASE_COMMIT}}" ] || [ -n "$(git status --porcelain)" ]; then
          echo "The release build changed the source tree. Restore it before retrying." >&2
          exit 1
        fi
        codesign --force --sign "$sign_identity" --options runtime --timestamp \
          "$app_path/Contents/MacOS/{{.APP_NAME}}"
        codesign --force --sign "$sign_identity" --options runtime --timestamp "$app_path"
        codesign --verify --deep --strict --verbose=2 "$app_path"
        ditto -c -k --norsrc --noextattr --noqtn --noacl --keepParent \
          "$app_path" "$work_dir/{{.PRODUCT_NAME}}-notary.zip"
        scripts/release/notarize-macos.sh submit \
          --input "$work_dir/{{.PRODUCT_NAME}}-notary.zip" \
          --profile "{{.NOTARY_PROFILE}}" --keychain "{{.RELEASE_KEYCHAIN}}"
        xcrun stapler staple "$app_path"
        xcrun stapler validate "$app_path"
        ditto -c -k --norsrc --noextattr --noqtn --noacl --keepParent \
          "$app_path" "$raw_dir/{{.UPDATER_ZIP_NAME}}"
        go run ./scripts/releasetool sign-update \
          --private-key "$PROFILEDECK_UPDATE_SIGNING_KEY_FILE" \
          --artifact "$raw_dir/{{.UPDATER_ZIP_NAME}}" \
          --output "$raw_dir/{{.UPDATER_SIGNATURE_NAME}}"
        mkdir "$work_dir/dmg"
        ditto "$app_path" "$work_dir/dmg/{{.PRODUCT_NAME}}.app"
        ln -s /Applications "$work_dir/dmg/Applications"
        hdiutil create -volname "{{.PRODUCT_NAME}}" -srcfolder "$work_dir/dmg" \
          -format UDZO "$raw_dir/{{.INSTALLER_DMG_NAME}}"
        codesign --force --sign "$sign_identity" --timestamp "$raw_dir/{{.INSTALLER_DMG_NAME}}"
        codesign --verify --verbose=2 "$raw_dir/{{.INSTALLER_DMG_NAME}}"
        scripts/release/notarize-macos.sh submit \
          --input "$raw_dir/{{.INSTALLER_DMG_NAME}}" \
          --profile "{{.NOTARY_PROFILE}}" --keychain "{{.RELEASE_KEYCHAIN}}"
        xcrun stapler staple "$raw_dir/{{.INSTALLER_DMG_NAME}}"
        xcrun stapler validate "$raw_dir/{{.INSTALLER_DMG_NAME}}"
        scripts/release/verify-macos.sh \
          --directory "$raw_dir" --version "{{.VERSION}}" --short-version "{{.SHORT_VERSION}}" \
          --build-number "{{.BUILD_NUMBER}}" --product "{{.PRODUCT_NAME}}" \
          --binary "{{.APP_NAME}}" --bundle-id "{{.MACOS_BUNDLE_ID}}" \
          --min-version "{{.MACOS_MIN_VERSION}}" --public-key "$PROFILEDECK_UPDATE_PUBLIC_KEY_BASE64" \
          --updater "{{.UPDATER_ZIP_NAME}}" --signature "{{.UPDATER_SIGNATURE_NAME}}" \
          --installer "{{.INSTALLER_DMG_NAME}}"
        go run ./scripts/releasetool handoff \
          --version "{{.VERSION}}" --build-number "{{.BUILD_NUMBER}}" \
          --commit "{{.RELEASE_COMMIT}}" --built-at "$built_at" \
          --platform "{{.RELEASE_PLATFORM}}" --input "$raw_dir" --output "$final_dir"
    requires:
      vars:
        - VERSION
        - BUILD_NUMBER
        - RELEASE_COMMIT
        - RELEASES_DIR
    vars:
      RELEASE_CONTRACT:
        sh: go run ./scripts/releasetool contract --version "{{.VERSION}}" --platforms "{{.RELEASE_PLATFORM}}"
      PRODUCT_NAME: '{{(.RELEASE_CONTRACT | mustFromJson).product}}'
      SHORT_VERSION: '{{(.RELEASE_CONTRACT | mustFromJson).short_version}}'
      UPDATER_ZIP_NAME: '{{(index (.RELEASE_CONTRACT | mustFromJson).platforms 0).asset_names.updater}}'
      UPDATER_SIGNATURE_NAME: '{{(index (.RELEASE_CONTRACT | mustFromJson).platforms 0).asset_names.signature}}'
      INSTALLER_DMG_NAME: '{{(index (.RELEASE_CONTRACT | mustFromJson).platforms 0).asset_names.installer}}'

  run:
    cmds:
      - '"./{{.BIN_DIR}}/{{.APP_NAME}}"'
