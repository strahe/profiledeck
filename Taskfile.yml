version: '3'

vars:
  APP_NAME: profiledeck-desktop
  BIN_DIR: bin
  FRONTEND_DIR: desktop/frontend
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  GOOS: '{{.GOOS | default OS}}'

includes:
  common: ./build/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

# Wails embeds Task, so TASK_EXE preserves the CLI path selected by Make.
tasks:
  build:
    desc: Build the Wails desktop application
    cmds:
      - task: '{{.GOOS}}:build'
        vars:
          DEV: '{{.DEV}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
          ARCH: '{{.ARCH}}'
          OUTPUT: '{{.OUTPUT}}'
          VERSION: '{{.VERSION}}'
          COMMIT: '{{.COMMIT}}'
          BUILD_DATE: '{{.BUILD_DATE}}'

  run:
    desc: Run the existing desktop binary
    cmds:
      - task: '{{.GOOS}}:run'

  dev:
    desc: Run the desktop application with Wails and Vite hot reload
    cmds:
      - '"{{.TASK_EXE}}" dev -config ./build/config.yml -port {{.VITE_PORT}}'
    env:
      PATH: '{{if ne (osBase .TASK_EXE) .TASK_EXE}}{{osDir .TASK_EXE}}{{.PATH_LIST_SEPARATOR}}{{end}}{{.PATH}}'
