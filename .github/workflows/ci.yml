name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Check core
        run: make ci-core-check

  core-windows:
    if: ${{ vars.DISABLE_WINDOWS_CI != 'true' }}
    runs-on: ${{ vars.WINDOWS_RUNS_ON || 'windows-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Test core on Windows
        run: go test ./cmd/... ./internal/...

  desktop:
    runs-on: ${{ vars.MACOS_RUNS_ON || 'macos-26' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Test macOS core with cgo
        run: go test ./cmd/... ./internal/...

      - name: Check security
        run: make ci-security-check

      - name: Check desktop
        run: make ci-desktop-check

  desktop-native-build:
    name: Desktop build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'linux' && (vars.RUNS_ON || 'ubuntu-latest') || (vars.WINDOWS_RUNS_ON || 'windows-latest') }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(vars.DISABLE_WINDOWS_CI == 'true' && '["linux"]' || '["linux","windows"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install frontend dependencies
        run: npm --prefix desktop/frontend ci

      - name: Build frontend
        run: npm --prefix desktop/frontend run build

      - name: Build Wails desktop
        run: go build -tags production -o profiledeck-desktop${{ runner.os == 'Windows' && '.exe' || '' }} ./desktop
