name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version (X.Y.Z or X.Y.Z-beta.N)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  BUILD_NUMBER: ${{ github.run_number }}
  RELEASE_PLATFORMS: macos
  RELEASE_REPO: ${{ github.repository }}

jobs:
  validate:
    runs-on: ${{ vars.MACOS_RUNS_ON || 'macos-26' }}
    outputs:
      version: ${{ steps.source.outputs.version }}
      tag: ${{ steps.source.outputs.tag }}
      commit: ${{ steps.commit.outputs.commit }}

    steps:
      - name: Resolve release source
        id: source
        shell: bash
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
              echo "::error::Manual releases must run from main."
              exit 1
            fi
            version="$MANUAL_VERSION"
          else
            case "$GITHUB_REF" in
              refs/tags/v*) version="${GITHUB_REF_NAME#v}" ;;
              *)
                echo "::error::Tag releases require a v<version> tag."
                exit 1
                ;;
            esac
          fi
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-beta\.([1-9][0-9]*))?$ ]]; then
            echo "::error::Release version must be X.Y.Z or X.Y.Z-beta.N."
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=v%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Resolve commit
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse 'HEAD^{commit}')"
          if [[ ! "$commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release source did not resolve to a full Git commit."
            exit 1
          fi
          printf 'commit=%s\n' "$commit" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            desktop/frontend/package-lock.json
            docs/package-lock.json

      - name: Check GitHub release state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          make release-github-check \
            VERSION="${{ steps.source.outputs.version }}" \
            RELEASE_COMMIT="${{ steps.commit.outputs.commit }}"

      - name: Check source
        run: make ci-check

  build-macos:
    needs: validate
    runs-on: ${{ vars.MACOS_RUNS_ON || 'macos-26' }}
    environment: release
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
      NOTARY_PROFILE: apple-notary
      RELEASE_KEYCHAIN_NAME: profiledeck-release.keychain-db
      ORIGINAL_KEYCHAINS_NAME: profiledeck-original-keychains.txt
      CREDENTIAL_LOG_NAME: profiledeck-credential-command.log

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.commit }}
          fetch-depth: 1

      - name: Check release secrets
        shell: bash
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            APPLE_DEVELOPER_ID_P12_BASE64 \
            APPLE_DEVELOPER_ID_P12_PASSWORD \
            APPLE_NOTARY_ISSUER_ID \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_KEY_P8_BASE64; do
            if [[ -z "${!name-}" ]]; then
              echo "::error::Required Actions secret $name is not configured."
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Setup Apple release credentials
        shell: bash
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          keychain_password="$(uuidgen)"
          echo "::add-mask::$keychain_password"
          p12_path="$RUNNER_TEMP/developer-id.p12"
          p8_path="$RUNNER_TEMP/notary-key.p8"
          release_keychain="$RUNNER_TEMP/$RELEASE_KEYCHAIN_NAME"
          original_keychains_file="$RUNNER_TEMP/$ORIGINAL_KEYCHAINS_NAME"
          credential_log="$RUNNER_TEMP/$CREDENTIAL_LOG_NAME"

          run_private_step() {
            local error_message="$1"
            shift
            if ! "$@" > "$credential_log" 2>&1; then
              rm -f "$credential_log"
              echo "::error::$error_message"
              return 1
            fi
            rm -f "$credential_log"
          }

          security list-keychains -d user > "$original_keychains_file"
          original_keychains=()
          while IFS= read -r line; do
            keychain="${line#"${line%%[![:space:]]*}"}"
            keychain="${keychain#\"}"
            keychain="${keychain%\"}"
            if [[ -n "$keychain" ]]; then
              original_keychains+=("$keychain")
            fi
          done < "$original_keychains_file"

          printf '%s' "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$p12_path"
          printf '%s' "$APPLE_NOTARY_KEY_P8_BASE64" | base64 --decode > "$p8_path"
          chmod 600 "$p12_path" "$p8_path"

          security create-keychain -p "$keychain_password" "$release_keychain"
          security set-keychain-settings -lut 21600 "$release_keychain"
          security unlock-keychain -p "$keychain_password" "$release_keychain"
          run_private_step \
            "Could not import the Developer ID certificate. Verify the P12 data and password." \
            security import "$p12_path" \
            -k "$release_keychain" \
            -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          run_private_step \
            "Could not authorize signing tools to use the certificate. Verify that the P12 includes its private key." \
            security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$release_keychain"
          security list-keychains -d user -s "${original_keychains[@]}" "$release_keychain"

          if ! sign_identity="$(
            go run ./scripts/releasetool identity \
              --output name \
              --keychain "$release_keychain" \
              2> "$credential_log"
          )"; then
            rm -f "$credential_log"
            echo "::error::Could not resolve one Developer ID Application identity from the imported certificate."
            exit 1
          fi
          rm -f "$credential_log"
          if [[ ! "$sign_identity" =~ \(([A-Z0-9]{10})\)$ ]]; then
            echo "::error::The imported Developer ID Application identity does not contain a valid Team ID."
            exit 1
          fi
          team_id="${BASH_REMATCH[1]}"
          echo "::add-mask::$sign_identity"
          echo "::add-mask::$team_id"
          printf 'PROFILEDECK_RELEASE_SIGN_IDENTITY=%s\n' "$sign_identity" >> "$GITHUB_ENV"

          run_private_step \
            "Could not create the notarization profile. Verify the P8 data, key ID, issuer ID, and Team API key." \
            xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --key "$p8_path" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --keychain "$release_keychain" \
            --validate

          rm -f "$p12_path" "$p8_path"

      - name: Build macOS release
        run: |
          release_keychain="$RUNNER_TEMP/$RELEASE_KEYCHAIN_NAME"
          make ci-release-build-macos \
            VERSION="$VERSION" \
            BUILD_NUMBER="$BUILD_NUMBER" \
            RELEASE_COMMIT="$RELEASE_COMMIT" \
            RELEASE_KEYCHAIN="$release_keychain"

      - name: Upload macOS release handoff
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: .task/releases/v${{ needs.validate.outputs.version }}/platforms/macos
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true
          include-hidden-files: true

      - name: Cleanup Apple release credentials
        if: ${{ always() }}
        shell: bash
        run: |
          release_keychain="$RUNNER_TEMP/$RELEASE_KEYCHAIN_NAME"
          original_keychains_file="$RUNNER_TEMP/$ORIGINAL_KEYCHAINS_NAME"
          cleanup_status=0
          rm -f \
            "$RUNNER_TEMP/developer-id.p12" \
            "$RUNNER_TEMP/notary-key.p8" \
            "$RUNNER_TEMP/$CREDENTIAL_LOG_NAME"
          if [[ -f "$original_keychains_file" ]]; then
            original_keychains=()
            while IFS= read -r line; do
              keychain="${line#"${line%%[![:space:]]*}"}"
              keychain="${keychain#\"}"
              keychain="${keychain%\"}"
              if [[ -n "$keychain" ]]; then
                original_keychains+=("$keychain")
              fi
            done < "$original_keychains_file"
            if [[ "${#original_keychains[@]}" -gt 0 ]]; then
              if ! security list-keychains -d user -s "${original_keychains[@]}"; then
                echo "::error::Could not restore the original Keychain search list."
                cleanup_status=1
              fi
            else
              echo "::error::The original Keychain search list could not be restored."
              cleanup_status=1
            fi
          fi
          if [[ -f "$release_keychain" ]]; then
            if ! security delete-keychain "$release_keychain"; then
              echo "::error::Could not delete the temporary release Keychain."
              cleanup_status=1
            fi
          fi
          rm -f "$original_keychains_file"
          exit "$cleanup_status"

  assemble-release:
    needs:
      - validate
      - build-macos
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
      actions: read
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.commit }}
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Download macOS release handoff
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          destination=".task/releases/v${VERSION}/platforms/macos"
          if [[ -e "$destination" ]]; then
            echo "::error::The macOS release handoff destination is not empty."
            exit 1
          fi
          mkdir -p "$destination"
          gh run download "$GITHUB_RUN_ID" \
            --repo "$RELEASE_REPO" \
            --name release-macos \
            --dir "$destination"

      - name: Assemble release bundle
        run: |
          make ci-release-assemble \
            VERSION="$VERSION" \
            BUILD_NUMBER="$BUILD_NUMBER" \
            RELEASE_COMMIT="$RELEASE_COMMIT" \
            RELEASE_PLATFORMS="$RELEASE_PLATFORMS"

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: .task/releases/v${{ needs.validate.outputs.version }}/bundle
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true
          include-hidden-files: true

  draft-release:
    needs:
      - validate
      - assemble-release
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.validate.outputs.version }}
      RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.commit }}
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Download release bundle
        shell: bash
        run: |
          set -euo pipefail
          destination=".task/releases/v${VERSION}/bundle"
          if [[ -e "$destination" ]]; then
            echo "::error::The release bundle destination is not empty."
            exit 1
          fi
          mkdir -p "$destination"
          gh run download "$GITHUB_RUN_ID" \
            --repo "$RELEASE_REPO" \
            --name release-bundle \
            --dir "$destination"

      - name: Recheck GitHub release state
        run: |
          make release-github-check \
            VERSION="$VERSION" \
            RELEASE_COMMIT="$RELEASE_COMMIT" \
            RELEASE_PLATFORMS="$RELEASE_PLATFORMS"

      - name: Create or resume Draft Release
        run: |
          make ci-release-draft \
            VERSION="$VERSION" \
            BUILD_NUMBER="$BUILD_NUMBER" \
            RELEASE_COMMIT="$RELEASE_COMMIT" \
            RELEASE_PLATFORMS="$RELEASE_PLATFORMS"
